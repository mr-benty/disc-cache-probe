name: disc-probe
on:
  discussion_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_dispatch:
permissions:
  actions: write
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: ctx
        run: |
          echo "REF=$GITHUB_REF EVENT=$GITHUB_EVENT_NAME ACTOR=$GITHUB_ACTOR"
          echo "POISON-$GITHUB_EVENT_NAME-BY-$GITHUB_ACTOR" > marker.txt
      - name: save
        uses: actions/cache/save@v4
        with:
          path: marker.txt
          key: probe-${{ github.event_name }}-v3
