name: pr-approval-probe
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: ctx
        run: |
          echo "EVENT=$GITHUB_EVENT_NAME ACTOR=$GITHUB_ACTOR"
          echo "IF-YOU-SEE-THIS-FORK-APPROVAL-WAS-BYPASSED"
